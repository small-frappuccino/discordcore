<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Discordcore Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: #08101d;
        color: #e5edf8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 5% 0%, rgba(57, 177, 255, 0.22), transparent 45%),
          radial-gradient(circle at 95% 10%, rgba(41, 86, 225, 0.26), transparent 35%),
          #08101d;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .panel {
        width: min(720px, 100%);
        border-radius: 18px;
        background: rgba(10, 19, 32, 0.86);
        border: 1px solid rgba(124, 174, 255, 0.24);
        box-shadow: 0 22px 52px rgba(0, 0, 0, 0.45);
        padding: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.4rem, 2vw, 2rem);
      }

      p {
        margin: 0 0 10px;
        color: #b2c2dc;
      }

      code {
        color: #eef6ff;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body data-dashboard-shell="embed-loader-v1">
    <main class="shell" id="dashboard-fallback">
      <section class="panel">
        <h1>Dashboard assets not built</h1>
        <p id="dashboard-status">
          Run <code>bun run build</code> in <code>discordcore/ui</code> to generate the embedded frontend assets.
        </p>
      </section>
    </main>
    <div id="root" hidden></div>
    <script>
      (function () {
        var dashboardBase = "/manage/";
        var manifestPath = dashboardBase + ".vite/manifest.json";
        var fallback = document.getElementById("dashboard-fallback");
        var root = document.getElementById("root");
        var status = document.getElementById("dashboard-status");

        function setStatus(message) {
          if (status) {
            status.textContent = message;
          }
        }

        function normalizeAssetPath(assetPath) {
          return dashboardBase + String(assetPath || "").replace(/^\/+/, "");
        }

        function appendStylesheet(href) {
          if (!href || document.querySelector('link[data-dashboard-asset="' + href + '"]')) {
            return;
          }

          var link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;
          link.setAttribute("data-dashboard-asset", href);
          document.head.appendChild(link);
        }

        function collectCssFiles(manifest, entryName, visitedEntries, seenFiles, out) {
          if (!entryName || visitedEntries[entryName]) {
            return;
          }
          visitedEntries[entryName] = true;

          var entry = manifest[entryName];
          if (!entry) {
            return;
          }

          var cssFiles = Array.isArray(entry.css) ? entry.css : [];
          for (var i = 0; i < cssFiles.length; i += 1) {
            var cssPath = normalizeAssetPath(cssFiles[i]);
            if (seenFiles[cssPath]) {
              continue;
            }
            seenFiles[cssPath] = true;
            out.push(cssPath);
          }

          var imports = Array.isArray(entry.imports) ? entry.imports : [];
          for (var j = 0; j < imports.length; j += 1) {
            collectCssFiles(manifest, imports[j], visitedEntries, seenFiles, out);
          }
        }

        fetch(manifestPath, { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) {
              return null;
            }
            return response.json();
          })
          .then(function (manifest) {
            if (!manifest || typeof manifest !== "object") {
              return;
            }

            var entry =
              manifest["index.html"] ||
              Object.values(manifest).find(function (item) {
                return item && item.isEntry;
              });

            if (!entry || typeof entry.file !== "string" || entry.file.length === 0) {
              setStatus("Dashboard asset manifest is present, but no entry bundle was found.");
              return;
            }

            var cssFiles = [];
            collectCssFiles(
              manifest,
              entry.src || "index.html",
              Object.create(null),
              Object.create(null),
              cssFiles,
            );
            for (var i = 0; i < cssFiles.length; i += 1) {
              appendStylesheet(cssFiles[i]);
            }

            var script = document.createElement("script");
            script.type = "module";
            script.src = normalizeAssetPath(entry.file);
            script.addEventListener("load", function () {
              if (fallback) {
                fallback.hidden = true;
              }
              if (root) {
                root.hidden = false;
              }
            });
            script.addEventListener("error", function () {
              setStatus("Dashboard asset manifest was found, but the entry bundle failed to load.");
            });
            document.body.appendChild(script);
          })
          .catch(function () {
            setStatus("Run bun run build in discordcore/ui to generate the embedded frontend assets.");
          });
      })();
    </script>
  </body>
</html>
